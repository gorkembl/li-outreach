name: li-outreach runner

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - dry-run
          - init-sheet-only

concurrency:
  group: li-outreach
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Run
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CS_API_KEY: ${{ secrets.CS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DAILY_NEW_LEADS: ${{ vars.DAILY_NEW_LEADS || '5' }}
          DAILY_TOTAL_ACTIONS: ${{ vars.DAILY_TOTAL_ACTIONS || '40' }}
          DRY_RUN: ${{ github.event.inputs.mode == 'dry-run' && 'true' || 'false' }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "init-sheet-only" ]; then
            npm run init-sheet
          else
            npm start
          fi
